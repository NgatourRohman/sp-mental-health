<script>
    var role = localStorage.getItem("role");
    if (!role) {
        alert("Silakan login terlebih dahulu");
        window.location.href = "index.html";
    }
</script>

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Relasi - Sistem Pakar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">
    <!-- Sidebar diinject dari file terpisah -->
    <div id="sidebar"></div>

    <!-- Main Content -->
    <main class="md:ml-64 p-6 md:p-10 min-h-screen">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Data Relasi</h1>
            <p class="font-semibold text-gray-700 nama-admin">Nama Admin</p>
        </header>

        <!-- Tombol gangguan -->
        <section class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4">Pilih Gangguan untuk Melihat Gejala</h2>
            <div class="w-full max-w-6xl">
                <div id="gangguanContainer" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 w-full">
                    <p class="text-gray-500 col-span-full">Memuat data gangguan...</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // ===== Inject Sidebar (fixed & reusable) =====
        (function injectSidebar() {
            fetch('admin_sidebar.html')
                .then(function (resp) {
                    return resp.text();
                })
                .then(function (html) {
                    document.getElementById('sidebar').innerHTML = html;

                    // Set nama admin setelah inject
                    var nama = localStorage.getItem("nama") || "Admin";
                    var els = document.querySelectorAll(".nama-admin");
                    for (var i = 0; i < els.length; i++) {
                        els[i].textContent = nama;
                    }

                    // Tandai link aktif
                    var path = (location.pathname || "").split("/").pop() || "data_relasi.html";
                    var links = document.querySelectorAll('#sidebar a[href]');
                    for (var j = 0; j < links.length; j++) {
                        var a = links[j];
                        var href = a.getAttribute('href');
                        if (href && path === href) {
                            a.classList.add('bg-teal-200');
                        }
                    }
                })
                .catch(function (e) {
                    console.error('Gagal memuat sidebar:', e);
                });
        })();

        function logout() {
            localStorage.clear();
            alert("Anda telah logout.");
            window.location.href = "index.html";
        }

        document.addEventListener("DOMContentLoaded", function () {
            // nama admin di header (di luar sidebar)
            var nama = localStorage.getItem("nama") || "Admin";
            var els = document.querySelectorAll(".nama-admin");
            for (var i = 0; i < els.length; i++) {
                els[i].textContent = nama;
            }

            var container = document.getElementById("gangguanContainer");

            fetch("php/gangguan_get.php")
                .then(function (res) {
                    return res.json();
                })
                .then(function (data) {
                    if (!data || !data.length) {
                        container.innerHTML =
                            '<p class="text-gray-500 col-span-full">Tidak ada gangguan tersedia.</p>';
                        return;
                    }

                    var colors = [
                        "bg-teal-500", "bg-indigo-500", "bg-pink-500", "bg-amber-500", "bg-emerald-500",
                        "bg-sky-500", "bg-lime-500", "bg-fuchsia-500", "bg-purple-500", "bg-rose-500"
                    ];

                    container.innerHTML = "";

                    for (var i = 0; i < data.length; i++) {
                        var item = data[i];
                        var btn = document.createElement("button");
                        btn.className =
                            colors[i % colors.length] +
                            " w-full block px-6 py-5 rounded-xl text-white text-center font-semibold shadow-md hover:scale-105 transition-all duration-200";
                        btn.textContent = item.nama;
                        // tanpa template literal & arrow function
                        btn.onclick = (function (kode) {
                            return function () {
                                window.location.href = 'relasi_detail.html?kode=' +
                                    encodeURIComponent(kode);
                            };
                        })(item.kode);
                        container.appendChild(btn);
                    }
                })
                .catch(function (error) {
                    console.error("Gagal memuat data gangguan:", error);
                    container.innerHTML = '<p class="text-red-500 col-span-full">Gagal memuat data.</p>';
                });
        });
    </script>
</body>

</html>
