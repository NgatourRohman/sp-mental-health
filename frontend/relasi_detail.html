<script>
    const role = localStorage.getItem("role");
    if (!role) {
        alert("Silakan login terlebih dahulu");
        window.location.href = "index.html";
    }
</script>

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Relasi Gangguan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase-api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-md p-6">
        <div class="text-center mb-10">
            <h2 class="text-xl font-semibold">Nama Admin</h2>
            <p class="text-sm text-gray-500">Admin</p>
        </div>
        <nav class="space-y-4">
            <a href="admin_dashboard.html"
                class="block py-2 px-4 rounded-lg hover:bg-teal-100 font-medium">Dashboard</a>
            <a href="data_gangguan.html" class="block py-2 px-4 rounded-lg hover:bg-teal-100 font-medium">Data
                Gangguan</a>
            <a href="data_gejala.html" class="block py-2 px-4 rounded-lg hover:bg-teal-100 font-medium">Data Gejala</a>
            <a href="data_relasi.html" class="block py-2 px-4 rounded-lg bg-teal-200 font-medium">Data Relasi</a>
            <a href="data_user.html" class="block py-2 px-4 rounded-lg hover:bg-teal-100 font-medium">Data User</a>
            <a href="#" onclick="logout()"
                class="block py-2 px-4 rounded-lg hover:bg-red-100 text-red-500 font-medium">Logout</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-10">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold">Detail Gejala Gangguan</h1>
            <p class="font-semibold text-gray-700">Nama Admin</p>
        </header>

        <section class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-xl font-semibold mb-6">
                Gejala untuk Gangguan: <span id="judulGangguan" class="text-teal-600"></span>
            </h2>

            <!-- Card Container -->
            <div id="listGejala" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                <div class="col-span-full text-center text-gray-500">Memuat data...</div>
            </div>

            <div class="mt-8">
                <a href="data_relasi.html"
                    class="inline-block px-5 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 font-medium">←
                    Kembali</a>
            </div>
        </section>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const kodeGangguan = urlParams.get('kode');
        const judul = document.getElementById("judulGangguan");
        const listGejala = document.getElementById("listGejala");

        if (!kodeGangguan) {
            judul.textContent = "Tidak Diketahui";
            listGejala.innerHTML = "<div class='col-span-full text-red-500'>Kode gangguan tidak ditemukan.</div>";
        } else {
            SPDB.getRelasiDetail(kodeGangguan)
                .then(data => {
                    if (data.length === 0) {
                        listGejala.innerHTML =
                            "<div class='col-span-full text-gray-500'>Tidak ada gejala terkait gangguan ini.</div>";
                    } else {
                        judul.textContent = data[0].nama_gangguan || kodeGangguan;
                        listGejala.innerHTML = "";
                        data.forEach(g => {
                            const card = document.createElement("div");
                            card.className =
                                "bg-teal-50 border-l-4 border-teal-400 p-4 rounded-lg shadow hover:shadow-lg transition duration-300";
                            card.innerHTML = `
                <div class="flex items-start">
                  <div class="text-2xl text-teal-500 mr-3">🧠</div>
                  <div>
                    <p class="font-semibold text-gray-800">${g.nama_gejala}</p>
                    ${g.bobot ? `<p class="text-sm text-gray-500 mt-1">Bobot: ${g.bobot}</p>` : ""}
                  </div>
                </div>
              `;
                            listGejala.appendChild(card);
                        });
                    }
                })
                .catch(err => {
                    listGejala.innerHTML =
                        `<div class='col-span-full text-red-500'>Gagal mengambil data: ${err.message}</div>`;
                });
        }

        function logout() {
            localStorage.clear();
            alert("Anda telah logout.");
            window.location.href = "index.html";
        }
    </script>
</body>

</html>
