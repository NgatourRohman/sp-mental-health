<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Sistem Pakar Paskibra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="js/config.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-[#e9f2f1] h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
        <h2 class="text-3xl font-bold text-center mb-6 text-gray-800">Login</h2>
        <form id="loginForm" class="space-y-5">
            <div>
                <label for="email" class="block font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" name="email" placeholder="Masukan email" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-teal-400" />
            </div>
            <div>
                <label for="password" class="block font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" placeholder="Masukan password" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-teal-400" />
            </div>
            <button type="submit"
                class="w-full bg-teal-500 hover:bg-teal-600 text-white font-semibold py-3 rounded-xl transition duration-200">LOGIN</button>
        </form>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const formData = new FormData();
            formData.append("email", email);
            formData.append("password", password);

            try {
                const response = await fetch(CONFIG.API_BASE_URL + "login.php", {
                    method: "POST",
                    body: formData,
                });

                const data = await response.json();
                if (data.status === "success") {
                    alert("Login berhasil sebagai " + data.role);
                    localStorage.setItem("nama", data.nama);
                    localStorage.setItem("email", data.email); // email dari response PHP
                    localStorage.setItem("role", data.role);
                    window.location.href = data.role === "admin" ? "admin_dashboard.html" :
                        "user_dashboard.html";
                } else {
                    alert("Login gagal: " + data.message);
                }
            } catch (err) {
                alert("Terjadi kesalahan saat menghubungi server.");
                console.error(err);
            }
        });
    </script>

</body>

</html>
