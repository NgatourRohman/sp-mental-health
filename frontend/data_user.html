<script>
    const role = localStorage.getItem("role");
    if (!role) {
        alert("Silakan login terlebih dahulu");
        window.location.href = "index.html";
    }
</script>

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data User - Sistem Pakar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">
    <!-- Sidebar injected di sini -->
    <div id="sidebar"></div>
    <div id="sidebar-backdrop" class="fixed inset-0 bg-black bg-opacity-40 z-30 hidden md:hidden"></div>

    <main class="md:ml-64 p-6 md:p-10 min-h-screen">
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <button id="btnSidebar"
                    class="inline-flex md:hidden items-center justify-center w-10 h-10 rounded-lg border border-gray-300 hover:bg-gray-100"
                    aria-label="Toggle Sidebar" aria-expanded="false">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </button>
                <h1 class="text-2xl font-bold">Data User</h1>
            </div>
            <p class="font-semibold text-gray-700 nama-admin">Nama Admin</p>
        </header>

        <!-- SECTION: Data User -->
        <section class="bg-white rounded-xl shadow-md p-6">
            <div class="flex justify-end mb-4 space-x-2">
                <button onclick="tampilFormTambah()"
                    class="bg-teal-500 text-white px-4 py-2 rounded hover:bg-teal-600">+ Tambah User</button>
                <button onclick="cetakDataSiswa()"
                    class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Cetak</button>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full text-sm text-left text-gray-700">
                    <thead class="bg-gray-200 text-gray-800 font-semibold">
                        <tr>
                            <th class="px-6 py-3">ID</th>
                            <th class="px-6 py-3">Nama</th>
                            <th class="px-6 py-3">Email</th>
                            <th class="px-6 py-3">Peran</th>
                            <th class="px-6 py-3">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelUser">
                        <tr>
                            <td colspan="5" class="px-6 py-4 text-center">Memuat data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- SECTION: Hasil Diagnosa -->
        <section class="bg-white rounded-xl shadow-md p-6 mt-6">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <h2 class="text-lg font-semibold">Hasil Diagnosa Terakhir</h2>
                    <span id="statusHasil" class="text-sm text-gray-500">Menunggu data user…</span>
                </div>
                <button onclick="cetakHasilDiagnosa()"
                    class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Cetak Diagnosa</button>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full text-sm text-left text-gray-700">
                    <thead class="bg-gray-200 text-gray-800 font-semibold">
                        <tr>
                            <th class="px-6 py-3">ID Siswa</th>
                            <th class="px-6 py-3">Nama</th>
                            <th class="px-6 py-3">Email</th>
                            <th class="px-6 py-3">Jenis Kelamin</th>
                            <th class="px-6 py-3">Kondisi</th>
                            <th class="px-6 py-3">Saran</th>
                        </tr>
                    </thead>
                    <tbody id="tabelHasilDiagnosa">
                        <tr>
                            <td colspan="6" class="px-6 py-4 text-center text-gray-500">Menunggu data user…</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal Form Tambah/Ubah -->
    <div id="modalForm" class="fixed inset-0 bg-black bg-opacity-30 hidden flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl shadow-xl w-full max-w-md">
            <h2 id="formTitle" class="text-xl font-bold mb-4">Tambah User</h2>
            <form id="formUser">
                <input type="hidden" id="userId" />
                <div class="mb-3">
                    <label class="block text-gray-700 mb-1">Nama</label>
                    <input type="text" id="namaInput" class="w-full border rounded px-3 py-2" required />
                </div>
                <div class="mb-3">
                    <label class="block text-gray-700 mb-1">Email</label>
                    <input type="email" id="emailInput" class="w-full border rounded px-3 py-2" required />
                </div>
                <div class="mb-3 relative">
                    <label class="block text-gray-700 mb-1">Password</label>
                    <input type="password" id="passwordInput" class="w-full border rounded px-3 py-2 pr-10"
                        placeholder="(Kosongkan jika tidak diubah)" />
                    <button type="button" onclick="togglePassword()"
                        class="absolute top-9 right-3 text-gray-500 hover:text-gray-700">
                        <svg id="iconEyeOpen" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M2.25 12s3.75-7.5 9.75-7.5 9.75 7.5 9.75 7.5-3.75 7.5-9.75 7.5S2.25 12 2.25 12z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <svg id="iconEyeClose" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke-width="1.5" class="w-5 h-5 hidden">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3.98 8.223A10.477 10.477 0 001.5 12c0 .988.144 1.938.412 2.828M9.343 9.343A3 3 0 0114.657 14.657M6.667 6.667A10.45 10.45 0 0112 4.5c5.25 0 9.75 7.5 9.75 7.5a16.75 16.75 0 01-4.09 5.442M3 3l18 18" />
                        </svg>
                    </button>
                </div>
                <div class="flex justify-end space-x-2">
                    <button type="button" onclick="tutupForm()"
                        class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500">Batal</button>
                    <button type="submit"
                        class="bg-teal-500 text-white px-4 py-2 rounded hover:bg-teal-600">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        /* ===== Inject Sidebar (pisah file) ===== */
        (async function injectSidebar() {
            try {
                var resp = await fetch('admin_sidebar.html');
                var html = await resp.text();
                document.getElementById('sidebar').innerHTML = html;

                var adminNama = localStorage.getItem("nama") || "Admin";
                var els = document.querySelectorAll(".nama-admin");
                for (var i = 0; i < els.length; i++) els[i].textContent = adminNama;

                var currentPage = window.location.pathname.split("/").pop();
                var links = document.querySelectorAll('#sidebar a[href]');
                for (var j = 0; j < links.length; j++) {
                    var linkHref = links[j].getAttribute('href');
                    if (linkHref === currentPage) links[j].classList.add('bg-teal-200', 'font-medium');
                    else links[j].classList.remove('bg-teal-200');
                }

                if (typeof applyInitialSidebarState === "function") applyInitialSidebarState();
            } catch (e) {
                console.error('Gagal memuat sidebar:', e);
            }
        })();

        /* ====== Sidebar Toggle ====== */
        var btnSidebar = document.getElementById('btnSidebar');
        var sidebarBackdrop = document.getElementById('sidebar-backdrop');

        function getSidebarEl() {
            return document.getElementById('app-sidebar');
        }

        function isMobile() {
            return window.innerWidth < 768;
        }

        function openSidebar() {
            var el = getSidebarEl();
            if (!el) return;
            el.classList.remove('-translate-x-full');
            el.classList.add('translate-x-0');
            if (isMobile()) {
                sidebarBackdrop.classList.remove('hidden');
                try {
                    localStorage.setItem('sidebarOpenMobile', '1');
                } catch (e) {}
            }
            btnSidebar && btnSidebar.setAttribute('aria-expanded', 'true');
        }

        function closeSidebar() {
            var el = getSidebarEl();
            if (!el) return;
            if (isMobile()) {
                el.classList.add('-translate-x-full');
                el.classList.remove('translate-x-0');
                sidebarBackdrop.classList.add('hidden');
                try {
                    localStorage.setItem('sidebarOpenMobile', '0');
                } catch (e) {}
                btnSidebar && btnSidebar.setAttribute('aria-expanded', 'false');
            } else {
                el.classList.remove('-translate-x-full');
                el.classList.add('translate-x-0');
                btnSidebar && btnSidebar.setAttribute('aria-expanded', 'true');
            }
        }

        function toggleSidebar() {
            var el = getSidebarEl();
            if (!el) return;
            var tertutup = el.classList.contains('-translate-x-full');
            if (tertutup) openSidebar();
            else closeSidebar();
        }

        function applyInitialSidebarState() {
            var el = getSidebarEl();
            if (!el) return;
            if (isMobile()) {
                var pref = null;
                try {
                    pref = localStorage.getItem('sidebarOpenMobile');
                } catch (e) {}
                if (pref === '1') {
                    openSidebar();
                } else {
                    el.classList.add('-translate-x-full');
                    el.classList.remove('translate-x-0');
                    sidebarBackdrop.classList.add('hidden');
                    btnSidebar && btnSidebar.setAttribute('aria-expanded', 'false');
                }
            } else {
                el.classList.remove('-translate-x-full');
                el.classList.add('translate-x-0');
                sidebarBackdrop.classList.add('hidden');
                btnSidebar && btnSidebar.setAttribute('aria-expanded', 'true');
            }
        }
        btnSidebar && btnSidebar.addEventListener('click', toggleSidebar);
        sidebarBackdrop && sidebarBackdrop.addEventListener('click', closeSidebar);
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' || e.keyCode === 27) {
                if (isMobile()) closeSidebar();
            }
        });
        window.addEventListener('resize', applyInitialSidebarState);

        /* ===== Helpers ===== */
        function escapeHtml(str) {
            str = (str == null ? "" : String(str));
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function ambilDulu(obj, keys, def) {
            if (def === undefined) def = "-";
            for (var i = 0; i < keys.length; i++) {
                var k = keys[i];
                if (obj && obj[k] != null && obj[k] !== "") return obj[k];
            }
            return def;
        }

        // cache profil per email
        var profileCache = {};
        async function fetchProfilByEmail(email) {
            if (!email) return {};
            var key = String(email).toLowerCase();
            if (profileCache[key]) return profileCache[key];
            try {
                var r = await fetch("php/data_diri_get.php?email=" + encodeURIComponent(email));
                var j = await r.json();
                var data = (j && j.status === "success" && j.data) ? j.data : {};
                profileCache[key] = data;
                return data;
            } catch (e) {
                profileCache[key] = {};
                return {};
            }
        }

        // ===== Global Refs =====
        var usersCache = [];
        var diagnosaCache = []; // <=== untuk cetak diagnosa
        var tbody = document.getElementById("tabelUser");
        var tbodyHasil = document.getElementById("tabelHasilDiagnosa");
        var statusHasil = document.getElementById("statusHasil");

        // ===== Main Flows =====
        async function muatDataUser() {
            try {
                var res = await fetch("php/users_get.php");
                var users = await res.json();
                usersCache = Array.isArray(users) ? users : [];
                tbody.innerHTML = "";

                usersCache.filter(function (user) {
                        return (user.role || "").toLowerCase() === "siswa";
                    })
                    .forEach(function (user) {
                        var idTampil = "U" + String(user.id).padStart(3, '0');
                        var namaEnc = encodeURIComponent(user.nama || "");
                        var emailEnc = encodeURIComponent(user.email || "");
                        var tr = document.createElement("tr");
                        tr.classList.add("border-b");
                        tr.innerHTML =
                            '<td class="px-6 py-4">' + escapeHtml(idTampil) + '</td>' +
                            '<td class="px-6 py-4">' + escapeHtml(user.nama) + '</td>' +
                            '<td class="px-6 py-4">' + escapeHtml(user.email) + '</td>' +
                            '<td class="px-6 py-4">Siswa</td>' +
                            '<td class="px-6 py-4 space-x-2">' +
                            '<button onclick="tampilFormUbah(' + user.id + ', \'' + namaEnc + '\', \'' +
                            emailEnc +
                            '\')" class="px-3 py-1 bg-yellow-500 text-white rounded hover:bg-yellow-600">Ubah</button> ' +
                            '<button onclick="hapusUser(' + user.id +
                            ')" class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600">Hapus</button> ' +
                            '<button onclick="lihatRiwayat(\'' + emailEnc +
                            '\')" class="px-3 py-1 bg-teal-500 text-white rounded hover:bg-teal-600">Lihat Riwayat</button>' +
                            '</td>';
                        tbody.appendChild(tr);
                    });

                muatHasilDiagnosa();
            } catch (error) {
                console.error(error);
                tbody.innerHTML =
                    '<tr><td colspan="5" class="text-center px-6 py-4 text-red-500">Gagal memuat data user.</td></tr>';
                muatHasilDiagnosa();
            }
        }

        async function muatHasilDiagnosa() {
            var siswa = usersCache.filter(function (u) {
                return (u.role || "").toLowerCase() === "siswa";
            });
            if (siswa.length === 0) {
                statusHasil.textContent = "Tidak ada siswa.";
                tbodyHasil.innerHTML =
                    '<tr><td colspan="6" class="px-6 py-4 text-center text-gray-500">Tidak ada data</td></tr>';
                diagnosaCache = [];
                return;
            }

            statusHasil.textContent = "Memuat hasil diagnosa…";

            var requests = siswa.map(function (u) {
                return (async function () {
                    var email = u.email || "";
                    var hasil = {};
                    try {
                        var r = await fetch("php/hasil_diagnosa_get.php?email=" +
                            encodeURIComponent(email));
                        hasil = await r.json();
                    } catch (e) {
                        hasil = {};
                    }

                    var profil = await fetchProfilByEmail(email);
                    var jk = ambilDulu(profil, ["jenis_kelamin", "gender", "jk", "kelamin",
                        "jenisKelamin"
                    ], "-");

                    var saranText = "-";
                    if (hasil && Array.isArray(hasil.saran)) saranText = hasil.saran.join("; ");
                    else if (hasil && typeof hasil.saran === "string") saranText = hasil.saran
                        .split("\n").join("; ");

                    return {
                        adaHasil: !!(hasil && hasil.kondisi),
                        row: {
                            id_tampil: "U" + String(u.id).padStart(3, "0"),
                            nama: u.nama || "-",
                            email: email || "-",
                            jenis_kelamin: jk || "-",
                            kondisi: (hasil && hasil.kondisi) ? hasil.kondisi : "-",
                            saran: saranText || "-"
                        }
                    };
                })();
            });

            var settled = await Promise.all(requests.map(function (p) {
                return p.then(v => ({
                    status: "fulfilled",
                    value: v
                })).catch(e => ({
                    status: "rejected",
                    reason: e
                }));
            }));

            var rows = [];
            for (var i = 0; i < settled.length; i++) {
                var s = settled[i];
                if (s.status === "fulfilled" && s.value && s.value.adaHasil) rows.push(s.value.row);
            }

            if (rows.length === 0) {
                statusHasil.textContent = "Tidak ada hasil diagnosa yang tersedia.";
                tbodyHasil.innerHTML =
                    '<tr><td colspan="6" class="px-6 py-4 text-center text-gray-500">Belum ada hasil diagnosa.</td></tr>';
                diagnosaCache = [];
                return;
            }

            statusHasil.textContent = "Menampilkan " + rows.length + " hasil.";
            diagnosaCache = rows.slice(); // simpan untuk cetak

            tbodyHasil.innerHTML = rows.map(function (h) {
                return (
                    '<tr class="border-b">' +
                    '<td class="px-6 py-3">' + escapeHtml(h.id_tampil) + '</td>' +
                    '<td class="px-6 py-3">' + escapeHtml(h.nama) + '</td>' +
                    '<td class="px-6 py-3">' + escapeHtml(h.email) + '</td>' +
                    '<td class="px-6 py-3">' + escapeHtml(h.jenis_kelamin) + '</td>' +
                    '<td class="px-6 py-3">' + escapeHtml(h.kondisi) + '</td>' +
                    '<td class="px-6 py-3">' + escapeHtml(h.saran) + '</td>' +
                    '</tr>'
                );
            }).join("");
        }

        // ===== Cetak User =====
        function cetakDataSiswa() {
            const siapCetak = usersCache.filter(u => (u.role || "").toLowerCase() === "siswa")
                .map(u => ({
                    id_tampil: "U" + String(u.id).padStart(3, "0"),
                    nama: u.nama,
                    email: u.email,
                    peran: "Siswa"
                }));
            if (!siapCetak.length) {
                alert("Belum ada data siswa untuk dicetak.");
                return;
            }
            localStorage.setItem("laporanUser", JSON.stringify(siapCetak));
            const w = window.open("laporan_user.html", "_blank");
            if (!w) alert("Pop-up diblokir. Mohon izinkan pop-up untuk situs ini.");
        }

        // ===== Cetak Diagnosa (baru) =====
        function cetakHasilDiagnosa() {
            if (!Array.isArray(diagnosaCache) || diagnosaCache.length === 0) {
                alert("Belum ada hasil diagnosa untuk dicetak.");
                return;
            }
            localStorage.setItem("laporanDiagnosa", JSON.stringify(diagnosaCache));
            const w = window.open("laporan_diagnosa.html", "_blank");
            if (!w) alert("Pop-up diblokir. Mohon izinkan pop-up untuk situs ini.");
        }

        // ===== UI handlers lainnya =====
        function tampilFormTambah() {
            document.getElementById("formTitle").textContent = "Tambah User";
            document.getElementById("formUser").reset();
            document.getElementById("userId").value = "";
            document.getElementById("modalForm").classList.remove("hidden");
        }

        function tampilFormUbah(id, namaEnc, emailEnc) {
            document.getElementById("formTitle").textContent = "Ubah User";
            document.getElementById("userId").value = id;
            document.getElementById("namaInput").value = decodeURIComponent(namaEnc || "");
            document.getElementById("emailInput").value = decodeURIComponent(emailEnc || "");
            document.getElementById("passwordInput").value = "";
            document.getElementById("modalForm").classList.remove("hidden");
        }

        function tutupForm() {
            document.getElementById("modalForm").classList.add("hidden");
        }

        function togglePassword() {
            var input = document.getElementById("passwordInput");
            var eyeOpen = document.getElementById("iconEyeOpen");
            var eyeClose = document.getElementById("iconEyeClose");
            if (input.type === "password") {
                input.type = "text";
                eyeOpen.classList.add("hidden");
                eyeClose.classList.remove("hidden");
            } else {
                input.type = "password";
                eyeOpen.classList.remove("hidden");
                eyeClose.classList.add("hidden");
            }
        }
        async function hapusUser(id) {
            if (confirm("Yakin ingin menghapus user ini?")) {
                var res = await fetch("php/user_delete.php?id=" + id);
                var result = await res.json();
                alert(result.message);
                muatDataUser();
            }
        }

        function lihatRiwayat(emailEnc) {
            var email = decodeURIComponent(emailEnc || "");
            window.location.href = "riwayat_diagnosa_admin.html?email=" + encodeURIComponent(email);
        }

        function logout() {
            localStorage.clear();
            alert("Anda telah logout.");
            window.location.href = "index.html";
        }

        document.addEventListener("DOMContentLoaded", muatDataUser);
    </script>
</body>

</html>
