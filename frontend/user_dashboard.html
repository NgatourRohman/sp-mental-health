<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard User - Sistem Pakar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- Tempat inject sidebar -->
    <div id="sidebar"></div>

    <!-- Main Content -->
    <main class="p-10 ml-64">
        <!-- ml-64 = 16rem = lebar sidebar -->
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold">Dashboard</h1>
            <div class="text-right">
                <p class="font-semibold text-gray-700 nama-siswa">Nama User</p>
            </div>
        </header>

        <section class="mb-10">
            <h2 class="text-xl font-semibold mb-2">
                Holla <span class="nama-siswa">User!!</span>
            </h2>
            <p class="text-gray-600 max-w-2xl">
                Selamat datang di dashboard! Di sini kamu bisa mengelola semua aspek platform dengan mudah dan efisien.
            </p>
        </section>

        <!-- Menu Card -->
        <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-white rounded-xl shadow-md p-6 text-center">
                <div class="text-4xl mb-2">🧍</div>
                <h3 class="text-lg font-semibold">Data Diri</h3>
                <a href="data_diri.html"
                    class="mt-3 inline-block px-4 py-2 bg-teal-500 text-white rounded-lg hover:bg-teal-600">
                    Lihat Data
                </a>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 text-center">
                <div class="text-4xl mb-2">🩺</div>
                <h3 class="text-lg font-semibold">Diagnosa</h3>
                <a href="diagnosa.html"
                    class="mt-3 inline-block px-4 py-2 bg-teal-500 text-white rounded-lg hover:bg-teal-600">
                    Lihat Data
                </a>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 text-center">
                <div class="text-4xl mb-2">📄</div>
                <h3 class="text-lg font-semibold">Hasil Diagnosa</h3>
                <a href="hasil_diagnosa.html"
                    class="mt-3 inline-block px-4 py-2 bg-teal-500 text-white rounded-lg hover:bg-teal-600">
                    Lihat Data
                </a>
            </div>
        </section>
    </main>

    <script>
        (async function injectSidebar() {
            try {
                const resp = await fetch('user_sidebar.html', {
                    cache: 'no-store'
                });
                const html = await resp.text();
                document.getElementById('sidebar').innerHTML = html;

                // Set nama user setelah sidebar ter-inject
                const userNama = localStorage.getItem("nama") || "Siswa";
                document.querySelectorAll(".nama-siswa").forEach(el => el.textContent = userNama);

                // Tandai link aktif sesuai halaman saat ini
                const currentPage = window.location.pathname.split("/").pop() || 'user_dashboard.html';
                document.querySelectorAll('#sidebar a[href]').forEach(a => {
                    if (a.getAttribute('href') === currentPage) {
                        a.classList.add('bg-teal-200', 'font-medium');
                    } else {
                        a.classList.remove('bg-teal-200');
                    }
                });

                // ❌ Jangan tambahkan h-screen/flex ke container #sidebar (biarkan kosong)
            } catch (e) {
                console.error('Gagal memuat sidebar:', e);
            }
        })();

        // Dipanggil dari tombol di sidebar
        function logout() {
            localStorage.clear();
            alert("Anda telah logout.");
            window.location.href = "index.html";
        }
    </script>
</body>

</html>
